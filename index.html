<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>Padel Mix &amp; Match</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
        color: #f1f5f9;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      main {
        text-align: center;
        padding: 2rem;
        max-width: 28rem;
      }
      h1 { font-size: 2rem; margin: 0 0 0.5rem; }
      p  { color: #94a3b8; margin: 0.5rem 0; line-height: 1.5; }
      .pill {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        background: #1e293b;
        border: 1px solid #334155;
        font-size: 0.875rem;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Padel Mix &amp; Match</h1>
      <p>The app is coming soon.</p>
      <p>Random teams. Sum-to-24 scoring. All on your phone.</p>
      <span class="pill">Scaffolding in progress</span>
    </main>
  </body>
</html>
